    <p>新手就買寬基，台股就買 0050，美股就買 SMH 或 SOXX 抓半導體，QQQ 抓整個科技大盤，VOO 抓美國整個經濟。你不用選股，不用擇時，你要做的一件事就是跌的時候手不要抖，繼續買，大跌也不要賣！能猜準底部的都是靠運氣。</p>
  </div>

  <div id="ch-0605-8" class="article-section">
    <h2 style="border-color: #2E7D32;">老手策略與宏觀風險控管</h2>
    <p>如果你是老手，玩法可以升級到 50% 左右倉位買個股。台股這邊核心就是看龍頭和 AI 供應鏈的關鍵卡口，台積電定海神針，加上聯發科、日月光這種高級封裝。再加上存儲芯片製造測試、光連接、800 伏電壓控制芯片等。老手的功夫在於，挑出那些被大盤錯殺、但訂單還在成長的股票。</p>
    <p>在這個牛市裡，老手最重要的就是倉位控制，永遠都不要滿倉，也永遠不要空倉！現在納斯達克也是剛剛跌，到底跌到哪裡誰也不確定，所以現在千萬不要梭哈。</p>
    <p>現在市場最怕就是 6 月 17 日聯準會突然轉鷹說年底加息，大盤還得跌 15%，科技股甚至大跌 30% 都有可能。但如果你嚇得把股票都賣了那就錯了！別忘了川普一句話也能讓股市漲 15%，霍爾木茲海峽隨時就開放了，所以千萬不要被短期的震盪嚇住。</p>
