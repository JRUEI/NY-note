    <p>總結一下，最近 1-3 年還是以 AI 科技股為主。關鍵就看這 Mega seven (科技七巨頭) 每年的 AI 數據中心支出預算會不會持續增長，而且要看他們財報有沒有真的逐漸提升自己的盈利。</p>
    <p>投資優先順序：存儲還是第一，第二就是 CPU/GPU，第三就是封裝，第四要投資給這些提供製造和測試晶片機器的企業 (如台積電、英特爾、日月光)，第五就是光連結。台股也一樣，根據這個方向找龍頭股票就可以了。</p>
    <blockquote>「下週就看中東協議是否簽署，海峽是否開放，還有最重要的日本央行與美聯儲的會議。我對整個未來還是樂觀的，但是也是謹慎的。」</blockquote>
    <p>千萬不要用負債炒股，跌了就用現金補倉，最後一直持有到 2030 年，中間也會有一些調倉。希望大家和我一樣，做一個穩健的長期的投資選手，享受這個時代的 AI 紅利！</p>
