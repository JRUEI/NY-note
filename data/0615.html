    <p>只要債券的收益率下降，建設數據中心的貸款利息成本就會下跌，上市公司的成本會減少，最終財報毛利率就會提高，整個股市就會大漲。所以從這個邏輯推理，明天日本還有後天的美聯儲的加息就不會那麼強硬。這時候市場估值重新定價，預期通脹下降、利息下降，台美韓日股都會大漲一段時間。</p>

    <p>這麼多年我一直都在用 Investing.com。新手不知道買什麼、什麼時候買賣，你就進入點左邊字段 ProPicks AI，這是 AI 和人工專家帶你投資。你選擇「台灣芯片冠軍」這個策略，11 年回報 20 倍，每個月 1 號給你選 15 支股票。夏普比率 1.37，表示可以在風險較低的情況有非常優秀的回報。</p>

  <div id="ch-0615-8" class="article-section">

    <p>大家注意，6 月 24 日是一個非常大的日子，美國唯一的本土記憶體製造商 MU (美光) 將公佈財報。美光現在價格這麼高，你只要點擊主頁搜尋 MU 然後點擊 Warren AI，就問：如果 MU 不用週期股估值，那它是什麼價格？</p>
    <p>這個 Warren AI 就會結合所有的財經數據給你一個中肯的答案。它說，如果市場不把它當做週期股定價，就是 1,200-1,500 美元一股！根據行業邏輯可以長期持有，3-5 年會有很好的回報。</p>

  <div id="ch-0615-10" class="article-section">
    <h2 style="border-color: #6A1B9A;">估值標尺與馬拉松長跑</h2>
    <p>如果你看到有的股票，公允價值出現負的 40%、50% 的樣子，像國巨這種，這個時候你就知道，他不一定不是好股票，可能是非常好的股票，但是他現在是高位！你要買也是分批買入，不能梭哈，更不要借貸買入。</p>
    <blockquote>「因為這個估值標尺都告訴你了，一旦下跌那就是狂跌 30% 以上。如果你用了槓桿去買的話，那你一下就沒了。所以投資股票之前看估值，是給你一個投資的警醒。」</blockquote>
    <p>我們投資股市更像馬拉松長跑，不是要在幾個月內翻多少倍。只要你每年連續賺 20%、30% 左右，持續複利下去，十幾年你的財富就會膨脹到 15-20 倍，一下子你就財富自由了。</p>
  </div>

  <div id="ch-0615-11" class="article-section">
    <h2 style="border-color: #F57F17;">主權 AI 與出口禁令</h2>
    <p>這個周末還有一個大新聞，就是美國政府讓 Anthropic 暫停了最新的模型，只能給美國人用，不給外國人用。周末我看有人評論說這個是 AI 泡沫破滅、股票大跌，我看了都匪夷所思，準備都快笑哭了！川普政府禁止高端模型出口，這就證明了 AI 太有用了！這是對 AI 產業鏈的巨大利好。</p>
    <p>為什麼？因為現在全世界其他的發達國家（法國、德國、歐洲、新加坡、日本等），一下子全部意識到一件事：必須要有自己的主權 AI！</p>
    <p>一個國家的科研、軍事、農業、工業要發展，你必須自己建數據中心，自己訓練自己的高端模型，否則這些國家吃的就是美國人剩下的科技，很快就退回農業時代了。</p>
  </div>

  <div id="ch-0615-12" class="article-section">
    <h2 style="border-color: #1565C0;">全球軍備競賽與基建狂潮</h2>
    <p>如果要競爭，你就必須使用自己的高端 AI，必須自己建數據中心。這就好比現在的高盛、摩根大通，他們用自己的數據中心加美國最高端模型，24 小時在世界自動交易收割市場。你英國看了眼紅嗎？德國法國看了眼紅嗎？</p>
    <p>現在中國已經開始了 2 萬億資金建設自己的數據中心。只要中國一下場，大家想一下，印度要不要下場？日本要不要下場？韓國要不要下場？</p>
    <p>這樣一來，下半年開始，全世界的國家都要加大 AI 數據建設與 AI 基建，所有的相關物料都會供不應求！所以收回美光，24 號財報如果特別好但股價出現大跌，記住我會持續買入。</p>
  </div>

  <div id="ch-0615-13" class="article-section">
    <h2 style="border-color: #F57F17;">SpaceX 估值與太空概念</h2>
    <p>大家留言最多的是問 SpaceX 股價如何看？現在是 160 美元左右，整體市值是 2 萬億美元。你看一下市場公允價值，它再漲也很難往上了。SpaceX 再漲 50% 需要短期拿出 1 萬億美元的資金，這很難。但我是長期看好的，如果它持續下跌，我會持續買入。</p>
    <p>我認為現在資金全部去了 SpaceX，所以其他太空股票因為資金缺失出現下跌。但宇宙這麼大，SpaceX 發展也會帶動其他太空公司的發展，尤其是美國佔領月球的策略。</p>
    <p>但是它也需要一些激活，畢竟現在是概念為主，它的波動是最大的。你拿太空股票，都要耐得住寂寞，心臟要好，沒有形成太大利潤的概念股，只可以作為衛星股持有，持有太多會影響判斷力。</p>
  </div>

  <div id="ch-0615-14" class="article-section">
    <h2 style="border-color: #1565C0;">建立觀察倉與投資心法</h2>
    <p>我提到的這些股票，如果你想抄作業，又沒有時間深入研究想買入的話，一般的策略是先建立「觀察倉」。就是你買個一兩股測試一下，觀察這支股票的「股性」。你要根據自己的策略、性格，體會這支股票適不適合你。</p>
    <p>我剛開始投資時都是買大股票，但把科技股加入自選股天天看，看了幾年就摸索出來他們的股性。比如蘋果、英偉達、台積電，財報不管多好股票肯定會跌的，跌下去之後才會漲起來。</p>
    <p>總之你不了解股性的話，手癢忍不住就買入觀察倉。千萬不要聽別人說一個股票好，你就全倉梭哈或者是加了債務直接衝進去了！不要擔心在大牛市的時候沒有機會，機會有的是。</p>
  </div>

  <div id="ch-0615-15" class="article-section">
    <h2 style="border-color: #F57F17;">市場總結與防詐騙宣導</h2>
    <p>最後總結一下今天的投資筆記：今天開始，市場的邏輯會改變，看石油價格會不會持續下跌到 60 美元。這個過程市場會預計通脹會下去、降息週期來，AI 為主的股票會持續上漲，直到下一個重大重新估值事件的來臨，比如灰犀牛、黑天鵝之類的。</p>
    <p>這個月就看伊朗會不會反悔，會不會再次封鎖霍爾木茲海峽。如果他們很安穩很穩定，那我們就可以安靜地享受股市上漲的快樂。大家有問題請留言，認準我的 IG 和 Threads 上有藍色小勾勾的帳號。我沒有任何投資群、沒有助理帳號，小心詐騙！</p>
    <p>最後祝大家投資愉快，財源滾滾發大財！</p>
  </div>
