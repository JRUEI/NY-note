  <div id="ch-0619-5" class="article-section">
    <h2 style="border-color: #F57F17;">AI 週期的重點：記憶體為王</h2>
    <p>接下來講這次 AI 週期發財的重點：存為王、內存為王。我認為現在的股票策略裡面，絕對不能缺少內存投資。邏輯就是 AI 時代永遠是缺內存的，未來機器人要像人類一樣的工作，必須要有無上限的內存，而這需求趨勢才剛剛開始。</p>
    <p>這個月還剩一個最重要的時間點，就是 6 月 24 日美光的財報。現在美光股價已經漲得非常高，很有可能因為市場期望太高而在 6月24日大跌。它一大跌就會帶著其他內存股票下跌，如果跌了，我認為這是一個非常值得關注的機會。這個點如果順利通過，7月份會非常好。</p>
    <p>投資內存核心企業，就是韓國的海力士、三星，美國的美光、SNDK，日本的鎧俠。海力士 (000660)、三星電子 (005930) 是最純粹的 AI HBM 股票，市佔率 80%，美光佔 20%。8月份海力士要在美股上市，按美國納斯達克估值，價格會是現在韓國股票的 3 倍，這有極大概率會帶動韓國股市一起大漲，大家可以重點關注提前佈局。</p>
  </div>
  
  <div id="ch-0619-6" class="article-section">
    <h2 style="border-color: #1565C0;">從一線龍頭到封裝測試，全階佈局</h2>
    <p>除了英偉達 Vera Rubin HBM 需求外，DRAM 的利潤率也是暴增的。在 2026 年，DRAM 和固態硬碟 NAND 的營收都會暴增。食物鏈頂部收益最高，即使現在產量翻倍也滿足不了市場需求。內存板塊配置需要先選頂部公司：三星、海力士、美光；第二梯隊選 SNDK 和鎧俠；第三梯隊就是台灣的華邦電 (2344)、南亞科 (2408)。只要一線利潤上升，他們就會持續上漲。</p>
    <p>此外，還可以進行二階配置，即用於 HBM、NAND、DRAM 的封裝公司：台積電、日月光、美國英特爾、艾克爾 (AMKR)。蘋果要和英特爾一起研發晶片，而且 AMKR 要接台積電的外溢訂單，只要不斷試錯，英特爾未來會成為美國封裝的一線廠商，財報大跌時就是機會。</p>
    <p>第三梯隊就是設備和測試公司：美股的庫力索法 (KLIC)、泰瑞達 (TER)、應用材料、科磊；台股的測試龍頭包括力成 (6239)、京元電子 (2449)、致茂 (2360)、群聯 (8299)。雖然食物鏈底部的利潤率較低，但記住，一人成仙雞犬升天，他們也會非常非常好。</p>
  </div>
  
  <div id="ch-0619-7" class="article-section">
    <h2 style="border-color: #1565C0;">新手必看：半導體 ETF 投資法</h2>
    <p>新手嫌麻煩可以關注 ETF：SOXX、SMH 再加 ETF DRAM；台股可以配 0050 加上核心三家（三星、海力士、美光）。面對好股票價格很高的情況，除了大跌時入手，剩下的方式只有一個，就是慢慢地定期定額存股。2027 年、2028 年都是非常輝煌的兩年，這些核心股票一定要拿住。</p>
    <p>我自己研究和交易的方法都是在 moomoo 上做，三步走：第一步「發現」，在市場選 ETF 按照 AI、存儲器主題篩選；第二步「深度分析」，SMH 集中在英偉達、台積電，而 SOXX 較平均，透過 ETF 持倉透視功能，你能清楚看到 SK 海力士、三星、美光在裡面的權重。</p>
    <p>第三步「下單」，美股 ETF 是 0 佣金且支援碎股交易，SMH 一股 300 多美金，但你 10 美金就能開始買。利用定投功能自動買入免盯盤，新加坡開戶的朋友搜尋福利碼 NICOLAS88 還能領獎勵。川普發文敦促晶片在美國生產，18日美光和英特爾都大漲，大家一定要配置美國生產的晶片股來防止政治風險。</p>
  </div>
  
  <div id="ch-0619-8" class="article-section">
    <h2 style="border-color: #6A1B9A;">投資如德州撲克：看準機率，大膽下注</h2>
    <p>最後講非常重要的投資心理。選股選對了，離你到達財富自由只完成了 50%，還剩 50% 你必須要拿住！股票投資和人生最殘酷的地方是：你永遠看不清未來。它們不是像下象棋一眼望去大勢了如指掌，更像是德州撲克。</p>
    <p>你看到的信息永遠是不全的，必須從有限的信息中推理出機率高的那一局，然後大膽下注。但是要控制倉位，不能 All-in，有時候你拿了一手好牌也有可能會輸，一旦你輸光了，就只能下桌再也玩不了了。一定要留資金防範黑天鵝，比如外星人進攻地球這類想不到的事。</p>
    <p>今年底到 2027 年，我認為美國會大概率進入降息空間，這期間會因為 AI 取代白領而產生陣痛，物價也會隨生產力提升而下降，韓國、台灣、美股都將繼續大大受益。投資短期看的是運氣，長期是看的機率，在模糊中敢於行動的樂觀者，才是真正賺到錢的人！</p>
  </div>
