<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Nicolas Young 全方位知識庫</title>
  <style>
    /* 全局與框架樣式 */
    body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background-color: #1a1a1a; color: #EBEBEB; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif; }
    .sidebar { width: 320px; background: #111111; display: flex; flex-direction: column; border-right: 1px solid #2A2A2A; box-shadow: 2px 0 15px rgba(0,0,0,0.5); z-index: 100; flex-shrink: 0; }
    .sidebar-header { padding: 30px 20px 15px 20px; border-bottom: 1px solid #2A2A2A; display: flex; flex-direction: column; gap: 15px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header-top h2 { margin: 0; font-size: 20px; color: #E8C97A; letter-spacing: 0.05em; }
    
    /* 排序按鈕 */
    .sort-btn { background: #222; border: 1px solid #444; color: #aaa; border-radius: 6px; padding: 4px 8px; cursor: pointer; transition: 0.2s; font-size: 12px; }
    .sort-btn:hover { background: #E8C97A; color: #111; border-color: #E8C97A; }

    /* 模式切換按鈕 */
    .mode-switch { display: flex; background: #222; border-radius: 8px; padding: 4px; gap: 4px; }
    .mode-btn { flex: 1; padding: 8px 0; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; color: #888; transition: all 0.3s ease; font-weight: bold; }
    .mode-btn:hover { background: rgba(255,255,255,0.1); }
    .mode-btn.active { background: #E8C97A; color: #111; }

    /* 側邊欄選單樣式 */
    .menu-container { flex: 1; overflow-y: auto; display: none; padding: 10px 0; }
    .menu-container.active { display: block; }
    .menu-item { padding: 16px 24px; cursor: pointer; color: #aaa; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; font-size: 16px; border-left: 4px solid transparent; }
    .menu-item:hover { background: #1a1a1a; color: #fff; }
    .menu-item.active { background: rgba(232,201,122,0.1); color: #E8C97A; border-left: 4px solid #E8C97A; font-weight: bold; }
    .menu-badge { background: #333; color: #aaa; font-size: 12px; padding: 2px 8px; border-radius: 12px; }
    .menu-item.active .menu-badge { background: #E8C97A; color: #111; }

    /* 百科樹狀目錄樣式 */
    .wiki-group { border-bottom: 1px solid #222; }
    .wiki-date-item { padding: 14px 24px; cursor: pointer; color: #E8C97A; font-weight: bold; font-size: 16px; background: rgba(20,20,20,0.5); display: flex; justify-content: space-between; }
    .wiki-chapters { display: none; padding: 8px 0; background: #0a0a0a; }
    .wiki-group.active .wiki-chapters { display: block; }
    .chapter-link { display: block; padding: 10px 24px 10px 40px; color: #888; font-size: 14px; text-decoration: none; position: relative; }
    .chapter-link::before { content: "•"; position: absolute; left: 24px; color: #444; font-size: 18px; top: 8px; }
    .chapter-link:hover { color: #fff; background: #1a1a1a; }
    .chapter-link.active-chapter { color: #E8C97A; }
    .chapter-link.active-chapter::before { content: "▸"; color: #E8C97A; font-size: 14px; top: 10px; left: 22px; }

    /* 主內容區與工具列 */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #1a1a1a; }
    .toolbar { background: rgba(20,20,20,0.95); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2A2A2A; z-index: 50; flex-shrink: 0; }
    .toolbar h3 { margin: 0; font-size: 22px; }
    .action-btn { background: #E8C97A; color: #111; border: none; padding: 10px 24px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .action-btn:hover { background: #f2d999; transform: scale(1.05); }

    /* 各模式版面切換 */
    .view-container { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .view-container.active { display: flex; }
    .cards-pane { display: none; flex: 1; overflow-y: auto; padding: 60px 20px; flex-direction: column; align-items: center; gap: 40px; }
    .cards-pane.active { display: flex; }
    .card-wrapper { width: 1080px; height: 1920px; transform-origin: top center; transform: scale(0.35); margin-bottom: -1248px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); background: #111; }
    .wiki-pane { display: none; flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .wiki-pane.active { display: block; }
    .article-container { max-width: 800px; margin: 0 auto; padding: 60px 40px 100px 40px; color: #d1d5db; line-height: 1.8; font-size: 18px; }
    .mindmap-pane { display: none; flex: 1; overflow: auto; padding: 60px 80px; background: #161616; }
    .mindmap-pane.active { display: block; }

    /* 心智圖 Pure CSS 引擎 */
    .mm-tree { display: flex; align-items: center; font-family: 'PingFang TC', sans-serif; margin-bottom: 100px; }
    .mm-children { display: flex; flex-direction: column; gap: 24px; padding-left: 50px; position: relative; }
    .mm-branch { display: flex; align-items: center; position: relative; }
    .mm-branch::before { content: ''; position: absolute; left: -50px; top: 50%; width: 50px; border-top: 2px solid #555; }
    .mm-branch::after { content: ''; position: absolute; left: -50px; top: -12px; bottom: -12px; border-left: 2px solid #555; }
    .mm-branch:first-child::after { top: 50%; }
    .mm-branch:last-child::after { bottom: 50%; }
    .mm-branch:first-child:last-child::after { display: none; }
    .mm-node { position: relative; z-index: 2; padding: 12px 24px; border-radius: 8px; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .has-children > .mm-node::after { content: ''; position: absolute; right: -50px; top: 50%; width: 50px; border-top: 2px solid #555; }
    .mm-root { background: rgba(232,201,122,0.15); border: 2px solid #E8C97A; color: #E8C97A; font-size: 24px; font-weight: 900; font-family: 'Songti TC', serif; letter-spacing: 0.05em; }
    .mm-sub { background: #1f1f1f; border: 1px solid #1565C0; color: #90CAF9; font-size: 18px; font-weight: bold; }
    .mm-leaf { background: #111; border: 1px solid #333; color: #bbb; font-size: 15px; transition: 0.2s; }
    .mm-leaf:hover { border-color: #E8C97A; color: #fff; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.6); }
    
    /* 引入圖卡所需套件 */
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

  <!-- ================= 左側邊欄 ================= -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="header-top">
        <h2>📸 知識庫後台</h2>
        <!-- 排序切換按鈕 -->
        <button class="sort-btn" onclick="toggleSort()" id="sortBtn">降序 🔽</button>
      </div>
      <div class="mode-switch">
        <div class="mode-btn active" onclick="switchMode('cards')">🖼️ 圖卡</div>
        <div class="mode-btn" onclick="switchMode('wiki')">📖 百科</div>
        <div class="mode-btn" onclick="switchMode('mindmap')">🧠 心智圖</div>
      </div>
    </div>

    <!-- 1️⃣ [左選單] 圖卡模式 (注意 data-sort 用於日期排序) -->
    <div id="menu-cards" class="menu-container active">
      <!-- 【填寫處：側邊欄圖卡清單】例如： -->
      <div class="menu-item active sort-item" data-sort="0619" onclick="switchDate('0619', this, 'cards')"><span>📅 06 / 19</span><span class="menu-badge">10張</span></div>
    </div>

    <!-- 2️⃣ [左選單] 百科模式 -->
    <div id="menu-wiki" class="menu-container">
      <!-- 【填寫處：側邊欄百科目錄】例如： -->
      <div class="wiki-group active sort-item" data-sort="0619" id="wiki-group-0619">
        <div class="wiki-date-item" onclick="switchDate('0619', this.parentElement, 'wiki')"><span>📅 06 / 19 目錄</span><span>▾</span></div>
        <div class="wiki-chapters">
          <a href="#ch-0619-1" class="chapter-link active-chapter" onclick="setActiveChapter(this)">宏觀經濟與降息</a>
        </div>
      </div>
    </div>

    <!-- 3️⃣ [左選單] 心智圖模式 -->
    <div id="menu-mindmap" class="menu-container">
      <!-- 【填寫處：側邊欄心智圖清單】例如： -->
      <div class="menu-item active sort-item" data-sort="0619" onclick="switchDate('0619', this, 'mindmap')"><span>📅 06 / 19 架構</span><span class="menu-badge">全局</span></div>
    </div>
  </div>

  <!-- ================= 右側主要內容區 ================= -->
  <div class="main-content">
    
    <div class="toolbar">
      <div>
        <h3 id="current-title">請選擇左側日期</h3>
        <span style="font-size: 14px; color: #aaa;" id="statusText">當前模式：圖卡預覽與打包</span>
      </div>
      <button class="action-btn" id="toolbarBtn" onclick="downloadAllCards()">⬇️ 一鍵打包 (ZIP)</button>
    </div>

    <!-- 1️⃣ [右內容] 圖卡區 -->
    <div id="view-cards" class="view-container active">
      <!-- 【填寫處：圖卡 HTML】例如： -->
      <div id="cards-0619" class="cards-pane active" data-title="標題...">
         <!-- 在這裡貼入 0619 的 <div class="card-wrapper">... -->
      </div>
    </div>

    <!-- 2️⃣ [右內容] 百科區 -->
    <div id="view-wiki" class="view-container">
      <!-- 【填寫處：百科 HTML】例如： -->
      <div id="wiki-0619" class="wiki-pane active" data-title="[百科閱讀] 標題...">
         <!-- 在這裡貼入 0619 的 article-container... -->
      </div>
    </div>

    <!-- 3️⃣ [右內容] 心智圖區 -->
    <div id="view-mindmap" class="view-container">
      <!-- 【填寫處：心智圖 HTML】例如： -->
      <div id="mindmap-0619" class="mindmap-pane active" data-title="[架構] 標題...">
         <!-- 在這裡貼入 0619 的 mm-tree... -->
      </div>
    </div>

  </div>

  <!-- ================= 系統邏輯腳本 ================= -->
  <script>
    // 模式切換
    function switchMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.menu-container').forEach(menu => menu.classList.remove('active'));
      document.getElementById('menu-' + mode).classList.add('active');
      document.querySelectorAll('.view-container').forEach(view => view.classList.remove('active'));
      document.getElementById('view-' + mode).classList.add('active');

      const statusText = document.getElementById('statusText');
      const toolbarBtn = document.getElementById('toolbarBtn');
      if (mode === 'cards') { statusText.innerText = '模式：圖卡預覽與打包'; toolbarBtn.innerText = '⬇️ 一鍵打包 (ZIP)'; toolbarBtn.onclick = downloadAllCards; } 
      else if (mode === 'wiki') { statusText.innerText = '模式：百科閱讀'; toolbarBtn.innerText = '📋 準備就緒'; toolbarBtn.onclick = null; } 
      else { statusText.innerText = '模式：全局思維導圖'; toolbarBtn.innerText = '🧠 結構檢視中'; toolbarBtn.onclick = null; }

      const activePane = document.querySelector('#view-' + mode + ' > .active');
      if(activePane) document.getElementById('current-title').innerText = activePane.getAttribute('data-title');
    }

    // 日期切換
    function switchDate(dateId, element, mode) {
      if(mode === 'wiki') document.querySelectorAll('#menu-wiki .wiki-group').forEach(el => el.classList.remove('active'));
      else document.querySelectorAll('#menu-' + mode + ' .menu-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      const viewContainer = document.getElementById('view-' + mode);
      for(let i=0; i<viewContainer.children.length; i++) viewContainer.children[i].classList.remove('active');
      
      const targetPane = document.getElementById(mode + '-' + dateId);
      if(targetPane) {
        targetPane.classList.add('active');
        document.getElementById('current-title').innerText = targetPane.getAttribute('data-title');
      }
    }

    // 百科目錄高亮
    function setActiveChapter(element) {
      document.querySelectorAll('.chapter-link').forEach(link => link.classList.remove('active-chapter'));
      element.classList.add('active-chapter');
    }

    // ⭐ 日期升序/降序排序功能
    let isDescending = true;
    function toggleSort() {
      isDescending = !isDescending;
      document.getElementById('sortBtn').innerText = isDescending ? '降序 🔽' : '升序 🔼';
      
      // 分別對三個選單容器進行排序
      ['menu-cards', 'menu-wiki', 'menu-mindmap'].forEach(containerId => {
        const container = document.getElementById(containerId);
        const items = Array.from(container.querySelectorAll('.sort-item'));
        
        items.sort((a, b) => {
          const dateA = parseInt(a.getAttribute('data-sort'));
          const dateB = parseInt(b.getAttribute('data-sort'));
          return isDescending ? dateB - dateA : dateA - dateB;
        });
        
        // 重新附加到容器中
        items.forEach(item => container.appendChild(item));
      });
    }

    // 圖卡自動打包腳本
    async function downloadAllCards() {
      const btn = document.getElementById('toolbarBtn');
      const statusText = document.getElementById('statusText');
      btn.disabled = true;
      
      // 只抓取「當前處於 active 狀態」的那一天的圖卡
      const cardElements = document.querySelectorAll('.cards-pane.active .card-wrapper > div');
      if (cardElements.length === 0) {
        statusText.innerText = "❌ 找不到卡片！"; btn.disabled = false; return;
      }

      const zip = new JSZip(); let successCount = 0;
      for (let i = 0; i < cardElements.length; i++) {
        statusText.innerText = `⏳ 擷取中：第 ${i + 1} / ${cardElements.length} 張...`;
        const node = cardElements[i];
        node.scrollIntoView({ behavior: 'instant', block: 'center' });
        await new Promise(resolve => setTimeout(resolve, 200)); 

        try {
          const dataUrl = await htmlToImage.toPng(node, { pixelRatio: 1, quality: 1.0, style: { transform: 'scale(1)', transformOrigin: 'top left' }, cacheBust: true });
          zip.file(`Info-${i+1}.png`, dataUrl.split(',')[1], {base64: true});
          successCount++;
        } catch (error) { console.error(`失敗:`, error); }
      }
      
      if (successCount > 0) {
        statusText.innerText = `📦 生成 ZIP 檔...`;
        zip.generateAsync({type:"blob"}).then(function(content) {
          saveAs(content, `Cards_${document.querySelector('.cards-pane.active').id}.zip`);
          statusText.innerText = `🎉 打包完成！`; btn.disabled = false;
        });
      } else { btn.disabled = false; }
    }
  </script>
</body>
</html>
